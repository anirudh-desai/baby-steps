<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7b6aff" />
    <title>Baby Steps</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">Loading Baby Steps…</div>
    <script type="module" src="app.js?cachebust=1"></script>
    <script>
      window.addEventListener('error', (event) => {
        const app = document.getElementById('app');
        if (app) {
          app.textContent = `Error: ${event.message}`;
        }
      });
      window.addEventListener('unhandledrejection', (event) => {
        const app = document.getElementById('app');
        if (app) {
          app.textContent = `Unhandled error: ${event.reason}`;
        }
      });
    </script>
  </body>
</html>
